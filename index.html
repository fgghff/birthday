<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عيد ميلاد سعيد</title>

<style>
body{
    background: linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family: Arial;
    text-align:center;
    color:white;
    margin:0;
    padding:0;
}

.container{
    margin-top:120px;
}

h1{
    font-size:45px;
}

p{
    font-size:22px;
    width:70%;
    margin:auto;
    line-height:1.8;
}

.heart{
    font-size:40px;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1)}
    50%{transform:scale(1.3)}
    100%{transform:scale(1)}
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:25px;
    background:white;
    color:#ff4f81;
    cursor:pointer;
}

button:hover{
    background:#ffe3ec;
}
</style>
</head>

<body>

<div class="container">

<h1>🎂 عيد ميلاد سعيد حبيبتي 🎂</h1>

<p>
اليوم ليس يوما عاديا  
اليوم هو اليوم الذي جاء فيه اجمل شخص في حياتي  
اتمنى لك سنة مليئة بالسعادة والنجاح  
وان تبقي دائما السبب في ابتسامتي  
</p>

<div class="heart">❤️</div>

<button onclick="showMessage()">اضغطي هنا</button>

<p id="msg"></p>

</div>

<script>
function showMessage(){
document.getElementById("msg").innerHTML =
"احبك كثيرا واتمنى ان اكون معك في كل اعياد ميلادك القادمة ❤️";
}
</script>

</body>
</html>
