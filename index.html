<h2>الى حبيبتي رانيا</h2>

<p>
اليوم ليس يوما عاديا<br>
اليوم هو اليوم الذي جاءت فيه اجمل انسانة في حياتي<br>
رانيا وجودك جعل حياتي اجمل واكثر نورا<br>
ابتسامتك تجعل قلبي سعيد دائما<br>
اتمنى لك سنة مليئة بالفرح والنجاح والاحلام الجميلة
</p>

<p>
من حبيبك عبدالله ❤️
</p>

<!-- زر بصمة -->
<div class="fingerprint-btn" onclick="startCelebration()">
<span class="fingerprint-icon">🖐️</span>
</div>

<p id="stage2-text"></p>

<!-- الأغنية -->
<audio id="birthdaySong" loop>
  <source src="https://audio-ssl.itunes.apple.com/itunes-assets/AudioPreview123/v4/fb/e4/d2/fbe4d2ed-5357-9855-5898-1fad176a62bf/mzaf_11791228578074490528.plus.aac.p.m4a" type="audio/mp4">
</audio>

<script>
/* القلوب */
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);
setTimeout(()=>{heart.remove();},7000);
}
setInterval(createHeart,350);

/* الألعاب النارية */
function startFireworks(){
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
function createFirework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;
for(let i=0;i<90;i++){
particles.push({
x:x,y:y,
speed:Math.random()*5+1,
angle:Math.random()*Math.PI*2,
radius:Math.random()*3+1,
life:100
});
}
}
function animate(){
ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);
particles.forEach((p,index)=>{
p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fill();
if(p.life<=0){particles.splice(index,1);}
});
requestAnimationFrame(animate);
}
setInterval(createFirework,700);
animate();
}

/* تشغيل المرحلة الثانية والأغنية */
function startCelebration(){
document.getElementById("stage2-text").innerHTML="🎉 استمتعي بأغنية عيد الميلاد والعرض الخاص 🎵✨";
document.getElementById("birthdaySong").play();
startFireworks();
}
</script>

</body>
</html>
